services:
  postgres:
    image: postgres:16-alpine
    container_name: market-intel-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: market_intel
    volumes:
      - market_intel_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d market_intel"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  market_intel_pg_data:
